<!-- This is your version BEFORE locked order, now with blackout screen -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSL Draft Mock</title>

<style>
#maintenanceScreen {
  position: fixed;
  inset: 0;
  background: black;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  z-index: 999999;
  font-size: 48px;
  font-weight: 800;
  padding: 20px;
}
</style>
</head>
<body>

<div id="maintenanceScreen">
  <div>Mock Draft not available</div>
</div>

<h1>JSL Draft Mock (Editable Slots Version)</h1>

<!-- TOP BAR -->
<div>
  <button id="startBtn">Start Draft</button>
  <button id="pauseBtn">Pause Clock</button>
  <button id="resetBtn">Reset Draft</button>
</div>

<!-- TEAM SLOT SELECTION -->
<div id="teams"></div>

<script>

const teams = [
  { team: "Smash House", captain: "Jesse Sloan", slot: "" },
  { team: "Town Appliance", captain: "Yitzi Gross", slot: "" },
  { team: "Teller Life Insurance", captain: "Moshe Feintuch", slot: "" },
  { team: "Twillory", captain: "Rich Hochhouser", slot: "" },
  { team: "Altbanq", captain: "Shmuel Englander", slot: "" },
  { team: "Graber Media", captain: "Chaim Homnick", slot: "" },
  { team: "Premium Pergolas", captain: "Michael Esquenazi", slot: "" },
  { team: "Kol Ve'or", captain: "Yaakov Dvir", slot: "" }
];

function renderTeams() {
  const container = document.getElementById("teams");
  container.innerHTML = "";

  teams.forEach(team => {
    const div = document.createElement("div");

    const select = document.createElement("select");
    for (let i = 1; i <= teams.length; i++) {
      const option = document.createElement("option");
      option.value = i;
      option.text = "Slot " + i;
      select.appendChild(option);
    }

    select.onchange = (e) => {
      team.slot = e.target.value;
    };

    div.innerHTML = `<strong>${team.team}</strong> (${team.captain})`;
    div.appendChild(select);

    container.appendChild(div);
  });
}

renderTeams();

</script>

</body>
</html>
