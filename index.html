<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JSL Draft Mock</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
    }
    .header {
      padding: 24px;
      border-bottom: 1px solid #334155;
      background: #111827;
    }
    .header h1 { margin: 0 0 8px; font-size: 40px; }
    .header p { margin: 0; color: #cbd5e1; }
    .topbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
      align-items: center;
    }
    button, select, input {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
    }
    button {
      background: #2563eb;
      color: white;
      cursor: pointer;
    }
    button.secondary { background: #334155; }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .container {
      padding: 24px;
      display: grid;
      grid-template-columns: 320px 1fr 320px;
      gap: 20px;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 18px;
    }
    .card h2 { margin: 0 0 14px; font-size: 20px; }
    .small { color: #cbd5e1; font-size: 13px; }
    .team-box, .log-box, .best-box, .results-box {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .team-title, .player-title { font-weight: 700; margin-bottom: 4px; }
    .grid-players {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }
    .player-btn {
      width: 100%;
      text-align: left;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 14px;
    }
    .player-btn:hover { background: #162033; }
    .timer {
      font-size: 44px;
      font-weight: 800;
      margin: 8px 0;
    }
    .on-clock {
      font-size: 24px;
      font-weight: 800;
      margin-top: 8px;
    }
    .team-roster span {
      display: inline-block;
      background: #334155;
      border-radius: 999px;
      padding: 6px 10px;
      margin: 4px 4px 0 0;
      font-size: 12px;
    }
    .search-row {
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 10px;
      margin-bottom: 14px;
    }
    .search-row input, .search-row select, .topbar select {
      background: #0f172a;
      color: white;
      border: 1px solid #334155;
    }
    .mode-box {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 12px;
      margin-top: 12px;
    }
    .turn-tag {
      font-weight: 700;
      color: #93c5fd;
      margin-top: 8px;
    }
    .results-screen {
      display: none;
      padding: 24px;
    }
    .results-header { margin-bottom: 20px; }
    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }
    @media (max-width: 1200px) {
      .container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>JSL Draft Mock</h1>
    <p>JFL Basketball Draft Board</p>
    <div class="topbar">
      <select id="controlModeSelect">
        <option value="all">User drafts as every team</option>
        <option value="single">User drafts as one captain</option>
      </select>

      <select id="userTeamSelect"></select>

      <select id="cpuStyleSelect">
        <option value="best">CPU: Best Available</option>
        <option value="smart">CPU: Randomized Smart</option>
      </select>

      <button id="startBtn">Start Draft</button>
      <button id="pauseBtn" class="secondary">Pause Clock</button>
      <button id="resetBtn" class="secondary">Reset Draft</button>
      <button id="undoBtn" class="secondary">Undo Last Pick</button>
    </div>
  </div>

  <div id="mainDraftView" class="container">
    <div>
      <div class="card">
        <h2>Locked Draft Order</h2>
        <div id="teamsList"></div>
      </div>

      <div class="card" style="margin-top:20px;">
        <h2>Pick Clock</h2>
        <div class="timer" id="timer">1:00</div>
        <div class="small">1 minute per pick</div>
        <div class="on-clock" id="onClock">Ready to start</div>
        <div class="turn-tag" id="turnType"></div>
      </div>
    </div>

    <div>
      <div class="card">
        <h2>ESPN-Style Big Board</h2>
        <div class="search-row">
          <input id="searchInput" type="text" placeholder="Search players" />
          <select id="positionFilter">
            <option value="All">All Positions</option>
            <option value="Guard">Guard</option>
            <option value="Forward">Forward</option>
            <option value="Center">Center</option>
          </select>
        </div>
        <div id="cpuNote" class="mode-box small"></div>
        <div class="grid-players" id="playersGrid"></div>
      </div>

      <div class="card" style="margin-top:20px;">
        <h2>Draft Log</h2>
        <div id="draftLog"></div>
      </div>
    </div>

    <div>
      <div class="card">
        <h2>Best Available by Projection</h2>
        <div id="bestAvailable"></div>
      </div>

      <div class="card" style="margin-top:20px;">
        <h2>Teams</h2>
        <div id="teamsRosters"></div>
      </div>
    </div>
  </div>

  <div id="resultsScreen" class="results-screen">
    <div class="results-header">
      <h1 style="margin:0 0 8px;">Draft Results</h1>
      <p class="small" style="font-size:16px;">Final team drafts are shown below. Click Reset Draft to go back to the beginning.</p>
    </div>
    <div id="resultsGrid" class="results-grid"></div>
  </div>

  <script>
    const DRAFT_TIME = 60;

    const projectionOrder = {
      "Early First Round": 13,
      "Late First Round": 12,
      "Early 2nd Round": 11,
      "Late 2nd Round": 10,
      "Early 3rd Round": 9,
      "Late 3rd Round": 8,
      "Early 4th Round": 7,
      "Late 4th Round": 6,
      "Early 5th Round": 5,
      "Late 5th Round": 4,
      "Early 6th Round": 3,
      "Late 6th Round": 2,
      "Unranked": 1
    };

    const teams = [
      { team: "Smash House", captain: "Jesse Sloan", slot: "3" },
      { team: "Town Appliance", captain: "Yitzi Gross", slot: "7" },
      { team: "Teller Life Insurance", captain: "Moshe Feintuch", slot: "1" },
      { team: "Twillory", captain: "Rich Hochhouser", slot: "8" },
      { team: "Altbanq", captain: "Shmuel Englander", slot: "5" },
      { team: "Graber Media", captain: "Chaim Homnick", slot: "6" },
      { team: "Premium Pergolas", captain: "Michael Esquenazi", slot: "4" },
      { team: "Kol Ve'or", captain: "Yaakov Dvir", slot: "2" }
    ];

    const keepers = [
      { team: "Teller Life Insurance", player: "Dovi Jaffe", round: 3 },
      { team: "Kol Ve'or", player: "Moshe Bobker", round: 3 },
      { team: "Twillory", player: "Sam Klein", round: 4 },
      { team: "Altbanq", player: "Avi Newman", round: 3 },
      { team: "Graber Media", player: "Elazar Sauber", round: 1 },
      { team: "Town Appliance", player: "Ari Schwartz", round: 3 }
    ];

    const players = [
      { name: "Efraim Graber", position: "Forward", age: 34, projection: "Early 5th Round" },
      { name: "Mitch Pisarz", position: "Guard", age: 29, projection: "Early 4th Round" },
      { name: "Elazar Sauber", position: "Forward/Guard", age: 28, projection: "Early First Round" },
      { name: "Jerry Frenkel", position: "Forward/Guard", age: 36, projection: "Early 4th Round" },
      { name: "Zachary Sumner", position: "Forward", age: 32, projection: "Early 4th Round" },
      { name: "Donny Brodsky", position: "Guard", age: 28, projection: "Early 5th Round" },
      { name: "Gavriel Majeski", position: "Forward/Guard", age: 24, projection: "Late First Round" },
      { name: "Jonah Zrihen", position: "Forward", age: 29, projection: "Early First Round" },
      { name: "Jeremy Tabak", position: "Guard", age: 30, projection: "Late 2nd Round" },
      { name: "Simcha Schick", position: "Forward", age: 43, projection: "Early 6th Round" },
      { name: "Yisrael Rubin", position: "Center", age: 28, projection: "Late 5th Round" },
      { name: "Ariel Melool", position: "Guard", age: 33, projection: "Early First Round" },
      { name: "Dan Levine", position: "Forward", age: 46, projection: "Early 6th Round" },
      { name: "Dovi Pfeffer", position: "Center", age: 25, projection: "Unranked" },
      { name: "Eli Zidele", position: "Forward", age: 23, projection: "Unranked" },
      { name: "Yedidyah Lazar", position: "Guard", age: 33, projection: "Late 5th Round" },
      { name: "Avi Fuchs", position: "Forward", age: 40, projection: "Late 6th Round" },
      { name: "Adam Huttel", position: "Guard", age: 33, projection: "Late 4th Round" },
      { name: "Moshe Bobker", position: "Forward", age: 38, projection: "Late 2nd Round" },
      { name: "Yoni Yanay", position: "Center", age: 19, projection: "Late 6th Round" },
      { name: "Chaim Portal", position: "Forward", age: 25, projection: "Early 2nd Round" },
      { name: "David Cohen", position: "Guard", age: 23, projection: "Early First Round" },
      { name: "Sam Klein", position: "Guard", age: 36, projection: "Early 3rd Round" },
      { name: "Mark Ross", position: "Guard", age: 41, projection: "Late 6th Round" },
      { name: "Shimi Schiffer", position: "Forward", age: 30, projection: "Late 2nd Round" },
      { name: "Jacob Khafizov", position: "Guard", age: 18, projection: "Early 3rd Round" },
      { name: "Daniel Vapne", position: "Center", age: 33, projection: "Early 3rd Round" },
      { name: "Jacob Birn", position: "Center", age: 26, projection: "Early 3rd Round" },
      { name: "Ari Belsky", position: "Guard", age: 31, projection: "Late 2nd Round" },
      { name: "Avi Blush", position: "Guard", age: 18, projection: "Early First Round" },
      { name: "Yitzy Kessler", position: "Guard", age: 27, projection: "Late First Round" },
      { name: "Zevi Bachrach", position: "Center", age: 37, projection: "Late 4th Round" },
      { name: "Dovi Jaffe", position: "Guard", age: 16, projection: "Late 4th Round" },
      { name: "Ari Schwartz", position: "Forward/Guard", age: 36, projection: "Early 2nd Round" },
      { name: "Avi Newman", position: "Guard", age: 26, projection: "Late First Round" },
      { name: "Daniel Greenbaum", position: "Guard", age: 18, projection: "Late 3rd Round" },
      { name: "Yehuda Zin", position: "Guard", age: 28, projection: "Late First Round" },
      { name: "Evan Weinstein", position: "Guard", age: 42, projection: "Late 6th Round" },
      { name: "Dovid Bobker", position: "Guard", age: 21, projection: "Early 2nd Round" },
      { name: "David Benatar", position: "Forward", age: 19, projection: "Early 3rd Round" },
      { name: "Menachem Frischman", position: "Guard", age: 38, projection: "Late 4th Round" },
      { name: "Sruli Botwinick", position: "Guard", age: 31, projection: "Unranked" },
      { name: "Steven Mandel", position: "Guard", age: 38, projection: "Early 5th Round" },
      { name: "Shimon Shoshan", position: "Guard", age: 27, projection: "Late 6th Round" },
      { name: "Yechiel Zitwer", position: "Forward/Guard", age: 27, projection: "Late 2nd Round" },
      { name: "Eli Whiskey", position: "Forward", age: 43, projection: "Late 6th Round" },
      { name: "Yosef Fein", position: "Guard", age: 30, projection: "Late 4th Round" },
      { name: "Haim Taboli", position: "Forward/Center", age: 29, projection: "Early First Round" }
    ];

    let draftStarted = false;
    let draftComplete = false;
    let draftLog = [];
    let timer = DRAFT_TIME;
    let timerRunning = false;
    let interval = null;
    let controlMode = "all";
    let userTeam = teams[0].team;
    let cpuPending = false;
    let cpuStyle = "best";

    function projectionValue(p) {
      return projectionOrder[p] || 0;
    }

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m}:${String(s).padStart(2, "0")}`;
    }

    function orderedTeams() {
      return [...teams].sort((a, b) => Number(a.slot) - Number(b.slot));
    }

    function keeperLookup() {
      const map = {};
      keepers.forEach(k => {
        map[`${k.team}|${k.round}`] = k;
      });
      return map;
    }

    function keeperPlayerNames() {
      return new Set(keepers.map(k => k.player));
    }

    function snakeOrder() {
      const ordered = orderedTeams();
      const keeperMap = keeperLookup();
      const rounds = Math.ceil(players.length / teams.length) + 1;
      const order = [];

      for (let r = 1; r <= rounds; r++) {
        const roundOrder = r % 2 === 1 ? [...ordered] : [...ordered].reverse();
        roundOrder.forEach(team => {
          const key = `${team.team}|${r}`;
          if (keeperMap[key]) {
            order.push({
              round: r,
              team: team.team,
              isKeeperSkip: true,
              keeper: keeperMap[key]
            });
          } else {
            order.push({
              round: r,
              team: team.team,
              isKeeperSkip: false,
              keeper: null
            });
          }
        });
      }

      return order;
    }

    function draftedNames() {
      const names = new Set(keepers.map(k => k.player));
      draftLog.forEach(p => names.add(p.player.name));
      return names;
    }

    function availablePlayers() {
      const drafted = draftedNames();
      return players.filter(p => !drafted.has(p.name));
    }

    function currentTurnRaw() {
      return snakeOrder()[draftLog.length] || null;
    }

    function advancePastKeeperSkips() {
      let turn = currentTurnRaw();
      while (turn && turn.isKeeperSkip) {
        draftLog.push({
          pick: draftLog.length + 1,
          round: turn.round,
          team: turn.team,
          player: {
            name: turn.keeper.player,
            projection: players.find(p => p.name === turn.keeper.player)?.projection || "Unranked"
          },
          source: "Keeper",
          isKeeper: true
        });
        turn = currentTurnRaw();
      }
    }

    function currentTurn() {
      const turn = currentTurnRaw();
      if (!turn || turn.isKeeperSkip) return null;
      return turn;
    }

    function isUserTurn() {
      const turn = currentTurn();
      if (!turn) return false;
      return controlMode === "all" ? true : turn.team === userTeam;
    }

    function sortedAvailablePlayers() {
      return [...availablePlayers()].sort(
        (a, b) => projectionValue(b.projection) - projectionValue(a.projection)
      );
    }

    function cpuBestPick() {
      const sorted = sortedAvailablePlayers();
      if (cpuStyle === "best") return sorted[0];

      const topPool = sorted.slice(0, Math.min(5, sorted.length));
      if (!topPool.length) return null;

      const weighted = [];
      topPool.forEach((player, index) => {
        const weight = Math.max(1, 6 - index);
        for (let i = 0; i < weight; i++) weighted.push(player);
      });

      return weighted[Math.floor(Math.random() * weighted.length)];
    }

    function maybeRunCpuPick() {
      if (!draftStarted || draftComplete) return;

      advancePastKeeperSkips();

      if (!currentTurn()) {
        draftComplete = true;
        stopClock();
        render();
        return;
      }

      if (isUserTurn()) {
        cpuPending = false;
        render();
        return;
      }

      if (cpuPending) return;

      cpuPending = true;
      render();

      setTimeout(() => {
        const pick = cpuBestPick();
        cpuPending = false;
        if (pick && draftStarted && currentTurn() && !isUserTurn()) {
          makePick(pick.name, true);
        }
      }, 900);
    }

    function resetClock() {
      timer = DRAFT_TIME;
      render();
    }

    function startClock() {
      clearInterval(interval);
      timerRunning = true;
      interval = setInterval(() => {
        if (!timerRunning) return;
        if (timer > 0) timer--;
        render();
      }, 1000);
    }

    function stopClock() {
      timerRunning = false;
      render();
    }

    function makePick(playerName, byCpu = false) {
      if (!draftStarted || draftComplete) return;

      advancePastKeeperSkips();

      const turn = currentTurn();
      if (!turn) return;
      if (!byCpu && !isUserTurn()) return;

      const player = players.find(p => p.name === playerName);
      if (!player) return;

      draftLog.push({
        pick: draftLog.length + 1,
        round: turn.round,
        team: turn.team,
        player: { ...player },
        source: byCpu ? "CPU" : "User",
        isKeeper: false
      });

      advancePastKeeperSkips();

      if (!currentTurnRaw()) {
        draftComplete = true;
        stopClock();
      } else {
        resetClock();
        startClock();
      }

      render();
      maybeRunCpuPick();
    }

    function undoLastPick() {
      if (draftLog.length === 0) return;
      while (draftLog.length > 0) {
        const removed = draftLog.pop();
        if (!removed.isKeeper) break;
      }
      draftComplete = false;
      cpuPending = false;
      resetClock();
      if (draftStarted && currentTurnRaw()) startClock();
      render();
      maybeRunCpuPick();
    }

    function resetDraft() {
      draftStarted = false;
      draftComplete = false;
      draftLog = [];
      timer = DRAFT_TIME;
      cpuPending = false;
      stopClock();
      document.getElementById("searchInput").value = "";
      document.getElementById("positionFilter").value = "All";
      render();
    }

    function teamRoster(teamName) {
      const roster = [];
      keepers
        .filter(k => k.team === teamName)
        .sort((a, b) => a.round - b.round)
        .forEach(k => {
          const p = players.find(x => x.name === k.player);
          roster.push({
            name: k.player,
            projection: p?.projection || "Unranked",
            isKeeper: true,
            keeperRound: k.round
          });
        });

      draftLog
        .filter(p => p.team === teamName && !p.isKeeper)
        .forEach(p => {
          roster.push({
            name: p.player.name,
            projection: p.player.projection,
            isKeeper: false
          });
        });

      return roster;
    }

    function filteredPlayers() {
      const search = document.getElementById("searchInput")?.value?.toLowerCase() || "";
      const position = document.getElementById("positionFilter")?.value || "All";

      return availablePlayers()
        .filter(p =>
          p.name.toLowerCase().includes(search) &&
          (position === "All" || p.position.toLowerCase().includes(position.toLowerCase()))
        )
        .sort((a, b) => projectionValue(b.projection) - projectionValue(a.projection));
    }

    function bestAvailablePlayers() {
      return [...availablePlayers()]
        .sort((a, b) => projectionValue(b.projection) - projectionValue(a.projection))
        .slice(0, 10);
    }

    function renderTopControls() {
      document.getElementById("controlModeSelect").value = controlMode;
      document.getElementById("cpuStyleSelect").value = cpuStyle;

      const teamSel = document.getElementById("userTeamSelect");
      teamSel.innerHTML = teams
        .map(t => `<option value="${t.team}" ${t.team === userTeam ? "selected" : ""}>Draft as ${t.team}</option>`)
        .join("");

      teamSel.style.display = controlMode === "single" ? "inline-block" : "none";
    }

    function renderTeams() {
      const el = document.getElementById("teamsList");
      el.innerHTML = "";

      orderedTeams().forEach(team => {
        const box = document.createElement("div");
        box.className = "team-box";
        box.innerHTML = `
          <div class="team-title">#${team.slot} ${team.team}</div>
          <div class="small">Captain: ${team.captain}</div>
          <div class="small" style="margin-top:8px;">Slot is locked</div>
        `;
        el.appendChild(box);
      });
    }

    function renderClock() {
      document.getElementById("timer").textContent = formatTime(timer);

      const turn = currentTurn();
      document.getElementById("onClock").textContent =
        draftComplete ? "Draft complete" :
        draftStarted ? (turn ? `${turn.team} is on the clock` : "Processing keepers...") :
        "Ready to start";

      const turnType = document.getElementById("turnType");
      if (!draftStarted || draftComplete) {
        turnType.textContent = "";
      } else if (!turn) {
        turnType.textContent = "Applying keeper skips...";
      } else if (isUserTurn()) {
        turnType.textContent =
          controlMode === "all"
            ? "User turn — you draft this pick"
            : `Your controlled team is up — ${userTeam}`;
      } else if (cpuPending) {
        turnType.textContent = "CPU is thinking...";
      } else {
        turnType.textContent = "CPU turn";
      }
    }

    function renderPlayers() {
      const el = document.getElementById("playersGrid");
      el.innerHTML = "";

      filteredPlayers().forEach(player => {
        const btn = document.createElement("button");
        btn.className = "player-btn";
        btn.disabled = !draftStarted || !currentTurn() || !isUserTurn() || draftComplete;
        btn.onclick = () => makePick(player.name, false);
        btn.innerHTML = `
          <div class="player-title">${player.name}</div>
          <div class="small">${player.position} • Age ${player.age}</div>
          <div style="margin-top:8px;" class="small">Projection: ${player.projection}</div>
        `;
        el.appendChild(btn);
      });

      const note = document.getElementById("cpuNote");
      if (draftComplete) {
        note.textContent = "Draft is complete. Final team results are shown below.";
      } else if (!draftStarted) {
        note.textContent = "Draft order is locked in. Keepers are already assigned. Choose whether you want to control one team or every team, then start the draft.";
      } else if (controlMode === "all") {
        note.textContent = "User drafts every non-keeper pick manually. No CPU picks will be made.";
      } else if (isUserTurn()) {
        note.textContent = `You are controlling ${userTeam}. Make this pick manually.`;
      } else {
        note.textContent = `The current team is CPU-controlled, so the site will auto-pick using ${cpuStyle === "best" ? "Best Available" : "Randomized Smart"} mode.`;
      }
    }

    function renderBestAvailable() {
      const el = document.getElementById("bestAvailable");
      el.innerHTML = "";

      bestAvailablePlayers().forEach((player, i) => {
        const box = document.createElement("div");
        box.className = "best-box";
        box.innerHTML = `
          <div class="player-title">#${i + 1} ${player.name}</div>
          <div class="small">${player.position} • ${player.projection}</div>
        `;
        el.appendChild(box);
      });
    }

    function renderLog() {
      const el = document.getElementById("draftLog");
      el.innerHTML = "";

      if (draftLog.length === 0) {
        el.innerHTML = `<div class="small">No picks yet.</div>`;
        return;
      }

      [...draftLog].reverse().forEach(item => {
        const box = document.createElement("div");
        box.className = "log-box";
        box.innerHTML = `
          <div class="player-title">Pick #${item.pick}</div>
          <div class="small">Round ${item.round} • ${item.source} • ${item.player.projection}</div>
          <div style="margin-top:6px;">${item.team} selected <strong>${item.player.name}</strong></div>
        `;
        el.appendChild(box);
      });
    }

    function renderRosters() {
      const el = document.getElementById("teamsRosters");
      el.innerHTML = "";

      orderedTeams().forEach(team => {
        const roster = teamRoster(team.team);
        const box = document.createElement("div");
        box.className = "team-box";
        box.innerHTML = `
          <div class="team-title">#${team.slot} ${team.team}</div>
          <div class="small">Captain: ${team.captain}</div>
          <div class="team-roster" style="margin-top:8px;">
            ${roster.length ? roster.map(player => `<span>${player.name}</span>`).join("") : `<span>No players yet</span>`}
          </div>
        `;
        el.appendChild(box);
      });
    }

    function renderResults() {
      const resultsGrid = document.getElementById("resultsGrid");
      resultsGrid.innerHTML = "";

      orderedTeams().forEach(team => {
        const roster = teamRoster(team.team);
        const box = document.createElement("div");
        box.className = "results-box";
        box.innerHTML = `
          <div class="team-title">#${team.slot} ${team.team}</div>
          <div class="small">Captain: ${team.captain}</div>
          <div style="margin-top:10px;">
            ${roster.length
              ? roster.map((player, idx) => `<div class="small" style="margin-bottom:6px;">${idx + 1}. ${player.name} — ${player.projection}${player.isKeeper ? ` (Keeper Round ${player.keeperRound})` : ""}</div>`).join("")
              : `<div class="small">No players</div>`
            }
          </div>
        `;
        resultsGrid.appendChild(box);
      });
    }

    function render() {
      renderTopControls();
      renderTeams();
      renderClock();
      renderPlayers();
      renderBestAvailable();
      renderLog();
      renderRosters();
      renderResults();

      document.getElementById("startBtn").disabled = draftStarted;
      document.getElementById("pauseBtn").textContent = timerRunning ? "Pause Clock" : "Resume Clock";

      document.getElementById("mainDraftView").style.display = draftComplete ? "none" : "grid";
      document.getElementById("resultsScreen").style.display = draftComplete ? "block" : "none";
    }

    document.getElementById("startBtn").onclick = () => {
      draftStarted = true;
      draftComplete = false;
      timer = DRAFT_TIME;
      advancePastKeeperSkips();
      if (!currentTurnRaw()) {
        draftComplete = true;
        stopClock();
      } else {
        startClock();
      }
      render();
      maybeRunCpuPick();
    };

    document.getElementById("pauseBtn").onclick = () => {
      if (!draftStarted || draftComplete) return;
      if (timerRunning) stopClock();
      else startClock();
      render();
    };

    document.getElementById("resetBtn").onclick = resetDraft;
    document.getElementById("undoBtn").onclick = undoLastPick;
    document.getElementById("searchInput").addEventListener("input", render);
    document.getElementById("positionFilter").addEventListener("change", render);
    document.getElementById("controlModeSelect").addEventListener("change", (e) => {
      controlMode = e.target.value;
      render();
      maybeRunCpuPick();
    });
    document.getElementById("userTeamSelect").addEventListener("change", (e) => {
      userTeam = e.target.value;
      render();
      maybeRunCpuPick();
    });
    document.getElementById("cpuStyleSelect").addEventListener("change", (e) => {
      cpuStyle = e.target.value;
      render();
      maybeRunCpuPick();
    });

    render();
  </script>
</body>
</html>
