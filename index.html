<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JSL Draft Mock</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
    }
    .header {
      padding: 24px;
      border-bottom: 1px solid #334155;
      background: #111827;
    }
    .header h1 { margin: 0 0 8px; font-size: 40px; }
    .header p { margin: 0; color: #cbd5e1; }
    .topbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
      align-items: center;
    }
    button, select, input {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
    }
    button { background: #2563eb; color: white; cursor: pointer; }
    button.secondary { background: #334155; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .container {
      padding: 24px;
      display: grid;
      grid-template-columns: 320px 1fr 320px;
      gap: 20px;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 18px;
    }
    .card h2 { margin: 0 0 14px; font-size: 20px; }
    .small { color: #cbd5e1; font-size: 13px; }
    .team-box, .player-box, .log-box, .best-box, .results-box {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .team-title, .player-title { font-weight: 700; margin-bottom: 4px; }
    .grid-players {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }
    .player-btn {
      width: 100%;
      text-align: left;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 14px;
    }
    .player-btn:hover { background: #162033; }
    .timer { font-size: 44px; font-weight: 800; margin: 8px 0; }
    .on-clock { font-size: 24px; font-weight: 800; margin-top: 8px; }
    .team-roster span {
      display: inline-block;
      background: #334155;
      border-radius: 999px;
      padding: 6px 10px;
      margin: 4px 4px 0 0;
      font-size: 12px;
    }
    .projection-select {
      width: 100%;
      margin-top: 8px;
      background: #334155;
      color: #fff;
    }
    .search-row {
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 10px;
      margin-bottom: 14px;
    }
    .search-row input, .search-row select, .topbar select {
      background: #0f172a;
      color: white;
      border: 1px solid #334155;
    }
    .mode-box {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 12px;
      margin-top: 12px;
    }
    .turn-tag {
      font-weight: 700;
      color: #93c5fd;
      margin-top: 8px;
    }
    .results-screen { display: none; padding: 24px; }
    .results-header { margin-bottom: 20px; }
    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }
    .hidden { display: none !important; }
    @media (max-width: 1200px) {
      .container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>JSL Draft Mock</h1>
    <p>JFL Basketball Draft Board</p>
    <div class="topbar">
      <select id="controlModeSelect">
        <option value="all">User drafts as every team</option>
        <option value="single">User drafts as one captain</option>
      </select>
      <select id="userTeamSelect"></select>
      <select id="cpuStyleSelect">
        <option value="best">CPU: Best Available</option>
        <option value="smart">CPU: Randomized Smart</option>
      </select>
      <button id="startBtn">Start Draft</button>
      <button id="pauseBtn" class="secondary">Pause Clock</button>
      <button id="resetBtn" class="secondary">Reset Draft</button>
      <button id="undoBtn" class="secondary">Undo Last Pick</button>
    </div>
  </div>

  <div id="mainDraftView" class="container">
    <div>
      <div class="card">
        <h2>Teams & Draft Slots</h2>
        <div id="teamsList"></div>
      </div>

      <div class="card" style="margin-top:20px;">
        <h2>Pick Clock</h2>
        <div class="timer" id="timer">1:00</div>
        <div class="small">1 minute per pick</div>
        <div class="on-clock" id="onClock">Not started</div>
        <div class="turn-tag" id="turnType"></div>
      </div>
    </div>

    <div>
      <div class="card">
        <h2>ESPN-Style Big Board</h2>
        <div class="search-row">
          <input id="searchInput" type="text" placeholder="Search players" />
          <select id="positionFilter">
            <option value="All">All Positions</option>
            <option value="Guard">Guard</option>
            <option value="Forward">Forward</option>
            <option value="Center">Center</option>
          </select>
        </div>
        <div id="cpuNote" class="mode-box small"></div>
        <div class="grid-players" id="playersGrid"></div>
      </div>

      <div class="card" style="margin-top:20px;">
        <h2>Draft Log</h2>
        <div id="draftLog"></div>
      </div>
    </div>

    <div>
      <div class="card">
        <h2>Best Available by Projection</h2>
        <div id="bestAvailable"></div>
      </div>

      <div class="card" style="margin-top:20px;">
        <h2>Teams</h2>
        <div id="teamsRosters"></div>
      </div>
    </div>
  </div>

  <div id="resultsScreen" class="results-screen">
    <div class="results-header">
      <h1 style="margin:0 0 8px;">Draft Results</h1>
      <p class="small" style="font-size:16px;">Final team drafts are shown below. Click Reset Draft to go back to the beginning.</p>
    </div>
    <div id="resultsGrid" class="results-grid"></div>
  </div>

  <script>
    const DRAFT_TIME = 60;
    const projectionOptions = [
      "Early First Round",
      "Late First Round",
      "Early 2nd Round",
      "Late 2nd Round",
      "Early 3rd Round",
      "Late 3rd Round",
      "Early 4th Round",
      "Late 4th Round",
      "Early 5th Round",
      "Late 5th Round",
      "Early 6th Round",
      "Late 6th Round"
    ];
    const projectionOrder = Object.fromEntries(projectionOptions.map((p, i) => [p, projectionOptions.length - i]));

    const teams = [
      { team: "Smash House", captain: "Jesse Sloan", slot: "3" },
      { team: "Town Appliance", captain: "Yitzi Gross", slot: "7" },
      { team: "Teller Life Insurance", captain: "Moshe Feintuch", slot: "1" },
      { team: "Twillory", captain: "Rich Hochhouser", slot: "8" },
      { team: "Altbanq", captain: "Shmuel Englander", slot: "5" },
      { team: "Graber Media", captain: "Chaim Homnick", slot: "6" },
      { team: "Premium Pergolas", captain: "Michael Esquenazi", slot: "4" },
      { team: "Kol Ve'or", captain: "Yaakov Dvir", slot: "2" }
    ];

    const players = [
      { name: "Efraim Graber", position: "Forward", age: 34, projection: "Early 2nd Round" },
      { name: "Mitch Pisarz", position: "Guard", age: 29, projection: "Early First Round" },
      { name: "Elazar Sauber", position: "Forward/Guard", age: 28, projection: "Early First Round" },
      { name: "Jerry Frenkel", position: "Forward/Guard", age: 36, projection: "Late First Round" },
      { name: "Zachary Sumner", position: "Forward", age: 32, projection: "Late First Round" },
      { name: "Donny Brodsky", position: "Guard", age: 28, projection: "Late First Round" },
      { name: "Gavriel Majeski", position: "Forward/Guard", age: 24, projection: "Early First Round" },
      { name: "Jonah Zrihen", position: "Forward", age: 29, projection: "Early 2nd Round" },
      { name: "Jeremy Tabak", position: "Guard", age: 30, projection: "Early 2nd Round" },
      { name: "Simcha Schick", position: "Forward", age: 43, projection: "Late 4th Round" },
      { name: "Yisrael Rubin", position: "Center", age: 28, projection: "Late First Round" },
      { name: "Ariel Melool", position: "Guard", age: 33, projection: "Late 2nd Round" },
      { name: "Dan Levine", position: "Forward", age: 46, projection: "Late 5th Round" },
      { name: "Dovi Pfeffer", position: "Center", age: 25, projection: "Late First Round" },
      { name: "Eli Zidele", position: "Forward", age: 23, projection: "Late 2nd Round" },
      { name: "Yedidya Lazar", position: "Guard", age: 33, projection: "Early 3rd Round" },
      { name: "Avi Fuchs", position: "Forward", age: 40, projection: "Early 5th Round" },
      { name: "Adam Huttel", position: "Guard", age: 33, projection: "Late 3rd Round" },
      { name: "Moshe Bobker", position: "Forward", age: 38, projection: "Late 4th Round" },
      { name: "Yoni Yanay", position: "Center", age: 19, projection: "Early 3rd Round" },
      { name: "Chaim Portal", position: "Forward", age: 25, projection: "Early 2nd Round" },
      { name: "David Cohen", position: "Guard", age: 23, projection: "Late First Round" },
      { name: "Sam Klein", position: "Guard", age: 36, projection: "Early 4th Round" },
      { name: "Mark Ross", position: "Guard", age: 41, projection: "Late 5th Round" },
      { name: "Shimi Schiffer", position: "Forward", age: 30, projection: "Early 2nd Round" },
      { name: "Jacob Khafizov", position: "Guard", age: 18, projection: "Late 3rd Round" },
      { name: "Daniel Vapne", position: "Center", age: 33, projection: "Early 3rd Round" },
      { name: "Jacob Birn", position: "Center", age: 26, projection: "Late 2nd Round" },
      { name: "Ari Belsky", position: "Guard", age: 31, projection: "Early 3rd Round" },
      { name: "Avi Blush", position: "Guard", age: 18, projection: "Early 5th Round" },
      { name: "Yitzy Kessler", position: "Guard", age: 27, projection: "Late 2nd Round" },
      { name: "Zevi Bachrach", position: "Center", age: 37, projection: "Late 5th Round" },
      { name: "Dovi Jaffe", position: "Guard", age: 16, projection: "Late 6th Round" },
      { name: "Ari Schwartz", position: "Forward/Guard", age: 36, projection: "Late 3rd Round" },
      { name: "Avi Newman", position: "Guard", age: 26, projection: "Early 2nd Round" },
      { name: "Daniel Greenbaum", position: "Guard", age: 18, projection: "Early 6th Round" },
      { name: "Yehuda Zin", position: "Guard", age: 28, projection: "Late First Round" },
      { name: "Evan Weinstein", position: "Guard", age: 42, projection: "Early 6th Round" },
      { name: "Dovid Bobker", position: "Guard", age: 21, projection: "Late 4th Round" },
      { name: "David Benatar", position: "Forward", age: 19, projection: "Early 4th Round" },
      { name: "Menachem Frischman", position: "Guard", age: 38, projection: "Early 5th Round" },
      { name: "Sruli Botwinick", position: "Guard", age: 31, projection: "Early 3rd Round" },
      { name: "Steven Mandel", position: "Guard", age: 38, projection: "Late 4th Round" },
      { name: "Shimon Shoshan", position: "Guard", age: 27, projection: "Early 2nd Round" },
      { name: "Yechiel Zitwer", position: "Forward/Guard", age: 27, projection: "Late First Round" },
      { name: "Eli Whiskey", position: "Forward", age: 43, projection: "Late 5th Round" },
      { name: "Yosef Fein", position: "Guard", age: 30, projection: "Early 3rd Round" },
      { name: "Chaim Taboli", position: "Forward/Center", age: 29, projection: "Late First Round" }
    ];

    let draftStarted = false;
    let draftLog = [];
    let timer = DRAFT_TIME;
    let timerRunning = false;
    let interval = null;
    let controlMode = 'all';
    let userTeam = teams[0].team;
    let cpuPending = false;
    let cpuStyle = 'best';
    let draftComplete = false;

    function projectionValue(p) { return projectionOrder[p] || 0; }
    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m}:${String(s).padStart(2, '0')}`;
    }

    function orderedTeams() {
      return [...teams].filter(t => t.slot !== '').sort((a, b) => Number(a.slot) - Number(b.slot));
    }

    function snakeOrder() {
      const ordered = orderedTeams();
      if (ordered.length !== teams.length) return [];
      const rounds = Math.ceil(players.length / teams.length);
      const order = [];
      for (let r = 1; r <= rounds; r++) {
        const roundOrder = r % 2 === 1 ? [...ordered] : [...ordered].reverse();
        roundOrder.forEach(team => order.push({ round: r, team: team.team }));
      }
      return order;
    }

    function draftedNames() { return new Set(draftLog.map(p => p.player.name)); }
    function availablePlayers() {
      const drafted = draftedNames();
      return players.filter(p => !drafted.has(p.name));
    }
    function currentTurn() {
      const order = snakeOrder();
      return order[draftLog.length] || null;
    }
    function isUserTurn() {
      const turn = currentTurn();
      if (!turn) return false;
      if (controlMode === 'all') return true;
      return turn.team === userTeam;
    }

    function sortedAvailablePlayers() {
      return [...availablePlayers()].sort((a, b) => projectionValue(b.projection) - projectionValue(a.projection));
    }

    function cpuBestPick() {
      const sorted = sortedAvailablePlayers();
      if (cpuStyle === 'best') return sorted[0];
      const topPool = sorted.slice(0, Math.min(5, sorted.length));
      if (!topPool.length) return null;
      const weighted = [];
      topPool.forEach((player, index) => {
        const weight = Math.max(1, 6 - index);
        for (let i = 0; i < weight; i++) weighted.push(player);
      });
      return weighted[Math.floor(Math.random() * weighted.length)];
    }

    function maybeRunCpuPick() {
      if (!draftStarted || draftComplete) return;
      const turn = currentTurn();
      if (!turn) return;
      if (isUserTurn()) {
        cpuPending = false;
        render();
        return;
      }
      if (cpuPending) return;
      cpuPending = true;
      render();
      setTimeout(() => {
        const pick = cpuBestPick();
        cpuPending = false;
        if (pick && draftStarted && currentTurn() && !isUserTurn()) makePick(pick.name, true);
      }, 900);
    }

    function resetClock() { timer = DRAFT_TIME; render(); }
    function startClock() {
      clearInterval(interval);
      timerRunning = true;
      interval = setInterval(() => {
        if (!timerRunning) return;
        if (timer > 0) timer--;
        render();
      }, 1000);
    }
    function stopClock() { timerRunning = false; render(); }

    function setSlot(teamName, slotValue) {
      teams.forEach(t => { if (t.slot === slotValue) t.slot = ''; });
      const team = teams.find(t => t.team === teamName);
      team.slot = slotValue;
      render();
    }

    function makePick(playerName, byCpu = false) {
      if (!draftStarted || draftComplete) return;
      const turn = currentTurn();
      if (!turn) return;
      if (!byCpu && !isUserTurn()) return;
      const player = players.find(p => p.name === playerName);
      if (!player) return;

      draftLog.push({
        pick: draftLog.length + 1,
        round: turn.round,
        team: turn.team,
        player: { ...player },
        source: byCpu ? 'CPU' : 'User'
      });

      if (!currentTurn()) {
        draftComplete = true;
        stopClock();
      } else {
        resetClock();
        startClock();
      }
      render();
      maybeRunCpuPick();
    }

    function undoLastPick() {
      if (draftLog.length === 0) return;
      draftLog.pop();
      draftComplete = false;
      cpuPending = false;
      resetClock();
      if (draftStarted && currentTurn()) startClock();
      render();
      maybeRunCpuPick();
    }

    function resetDraft() {
      draftStarted = false;
      draftComplete = false;
      draftLog = [];
      timer = DRAFT_TIME;
      cpuPending = false;
      stopClock();
      teams.forEach(t => t.slot = '');
      document.getElementById('searchInput').value = '';
      document.getElementById('positionFilter').value = 'All';
      render();
    }

    function teamRoster(teamName) {
      return draftLog.filter(p => p.team === teamName).map(p => p.player);
    }

    function filteredPlayers() {
      const search = document.getElementById('searchInput')?.value?.toLowerCase() || '';
      const position = document.getElementById('positionFilter')?.value || 'All';
      return availablePlayers()
        .filter(p => p.name.toLowerCase().includes(search) && (position === 'All' || p.position.toLowerCase().includes(position.toLowerCase())))
        .sort((a, b) => projectionValue(b.projection) - projectionValue(a.projection));
    }

    function bestAvailablePlayers() {
      return [...availablePlayers()].sort((a, b) => projectionValue(b.projection) - projectionValue(a.projection)).slice(0, 10);
    }

    function renderTopControls() {
      const modeSel = document.getElementById('controlModeSelect');
      const teamSel = document.getElementById('userTeamSelect');
      const cpuSel = document.getElementById('cpuStyleSelect');
      modeSel.value = controlMode;
      cpuSel.value = cpuStyle;
      teamSel.innerHTML = teams.map(t => `<option value="${t.team}" ${t.team === userTeam ? 'selected' : ''}>Draft as ${t.team}</option>`).join('');
      teamSel.style.display = controlMode === 'single' ? 'inline-block' : 'none';
    }

    function renderTeams() {
      const el = document.getElementById('teamsList');
      el.innerHTML = '';
      teams.forEach(team => {
        const box = document.createElement('div');
        box.className = 'team-box';
        box.innerHTML = `<div class="team-title">${team.team}</div><div class="small">Captain: ${team.captain}</div>`;
        box.innerHTML = `
  <div><strong>#${team.slot} ${team.team}</strong></div>
  <div>Captain: ${team.captain}</div>
  <div>Locked Slot</div>
`;
      });
    }

    function renderClock() {
      document.getElementById('timer').textContent = formatTime(timer);
      const turn = currentTurn();
      document.getElementById('onClock').textContent = draftComplete ? 'Draft complete' : (draftStarted ? (turn ? `${turn.team} is on the clock` : 'Draft complete') : 'Not started');
      const turnType = document.getElementById('turnType');
      if (!draftStarted || draftComplete || !turn) turnType.textContent = '';
      else if (isUserTurn()) turnType.textContent = controlMode === 'all' ? 'User turn — you draft this pick' : `Your controlled team is up — ${userTeam}`;
      else if (cpuPending) turnType.textContent = 'CPU is thinking...';
      else turnType.textContent = 'CPU turn';
    }

    function renderPlayers() {
      const el = document.getElementById('playersGrid');
      el.innerHTML = '';
      filteredPlayers().forEach(player => {
        const btn = document.createElement('button');
        btn.className = 'player-btn';
        btn.disabled = !draftStarted || !currentTurn() || !isUserTurn() || draftComplete;
        btn.onclick = () => makePick(player.name, false);
        btn.innerHTML = `
          <div class="player-title">${player.name}</div>
          <div class="small">${player.position} • Age ${player.age}</div>
          <div style="margin-top:8px;" class="small">Projection: ${player.projection}</div>
        `;
        el.appendChild(btn);
      });
      const note = document.getElementById('cpuNote');
      if (draftComplete) note.textContent = 'Draft is complete. Final team results are shown below.';
      else if (!draftStarted) note.textContent = 'Choose whether you want to draft as one captain or control every team before starting.';
      else if (controlMode === 'all') note.textContent = 'User drafts every team manually. No CPU picks will be made.';
      else if (isUserTurn()) note.textContent = `You are controlling ${userTeam}. Make this pick manually.`;
      else note.textContent = `The current team is CPU-controlled, so the site will auto-pick using ${cpuStyle === 'best' ? 'Best Available' : 'Randomized Smart'} mode.`;
    }

    function renderBestAvailable() {
      const el = document.getElementById('bestAvailable');
      el.innerHTML = '';
      bestAvailablePlayers().forEach((player, i) => {
        const box = document.createElement('div');
        box.className = 'best-box';
        box.innerHTML = `<div class="player-title">#${i + 1} ${player.name}</div><div class="small">${player.position} • ${player.projection}</div>`;
        el.appendChild(box);
      });
    }

    function renderLog() {
      const el = document.getElementById('draftLog');
      el.innerHTML = '';
      if (draftLog.length === 0) {
        el.innerHTML = `<div class="small">No picks yet.</div>`;
        return;
      }
      [...draftLog].reverse().forEach(item => {
        const box = document.createElement('div');
        box.className = 'log-box';
        box.innerHTML = `
          <div class="player-title">Pick #${item.pick}</div>
          <div class="small">Round ${item.round} • ${item.source} • ${item.player.projection}</div>
          <div style="margin-top:6px;">${item.team} selected <strong>${item.player.name}</strong></div>
        `;
        el.appendChild(box);
      });
    }

    function renderRosters() {
      const el = document.getElementById('teamsRosters');
      el.innerHTML = '';
      teams.forEach(team => {
        const roster = teamRoster(team.team);
        const box = document.createElement('div');
        box.className = 'team-box';
        box.innerHTML = `
          <div class="team-title">${team.team}</div>
          <div class="small">Captain: ${team.captain}</div>
          <div class="team-roster" style="margin-top:8px;">
            ${roster.length ? roster.map(player => `<span>${player.name}</span>`).join('') : `<span>No picks yet</span>`}
          </div>
        `;
        el.appendChild(box);
      });
    }

    function renderResults() {
      const resultsGrid = document.getElementById('resultsGrid');
      resultsGrid.innerHTML = '';
      teams.forEach(team => {
        const roster = teamRoster(team.team);
        const box = document.createElement('div');
        box.className = 'results-box';
        box.innerHTML = `
          <div class="team-title">${team.team}</div>
          <div class="small">Captain: ${team.captain}</div>
          <div style="margin-top:10px;">
            ${roster.length ? roster.map((player, idx) => `<div class="small" style="margin-bottom:6px;">${idx + 1}. ${player.name} — ${player.projection}</div>`).join('') : `<div class="small">No picks</div>`}
          </div>
        `;
        resultsGrid.appendChild(box);
      });
    }

    function render() {
      renderTopControls();
      renderTeams();
      renderClock();
      renderPlayers();
      renderBestAvailable();
      renderLog();
      renderRosters();
      renderResults();
      document.getElementById('startBtn').disabled = orderedTeams().length !== teams.length || draftStarted;
      document.getElementById('pauseBtn').textContent = timerRunning ? 'Pause Clock' : 'Resume Clock';
      document.getElementById('mainDraftView').style.display = draftComplete ? 'none' : 'grid';
      document.getElementById('resultsScreen').style.display = draftComplete ? 'block' : 'none';
    }

    document.getElementById('startBtn').onclick = () => {
      if (orderedTeams().length !== teams.length) {
        alert('Each team must choose a draft slot first.');
        return;
      }
      draftStarted = true;
      draftComplete = false;
      timer = DRAFT_TIME;
      startClock();
      render();
      maybeRunCpuPick();
    };
    document.getElementById('pauseBtn').onclick = () => {
      if (!draftStarted || draftComplete) return;
      if (timerRunning) stopClock();
      else startClock();
      render();
    };
    document.getElementById('resetBtn').onclick = resetDraft;
    document.getElementById('undoBtn').onclick = undoLastPick;
    document.getElementById('searchInput').addEventListener('input', render);
    document.getElementById('positionFilter').addEventListener('change', render);
    document.getElementById('controlModeSelect').addEventListener('change', (e) => { controlMode = e.target.value; render(); maybeRunCpuPick(); });
    document.getElementById('userTeamSelect').addEventListener('change', (e) => { userTeam = e.target.value; render(); maybeRunCpuPick(); });
    document.getElementById('cpuStyleSelect').addEventListener('change', (e) => { cpuStyle = e.target.value; render(); maybeRunCpuPick(); });

    render();
  </script>
  <audio id="tickSound" src="https://assets.mixkit.co/sfx/preview/mixkit-clock-ticking-1050.mp3" loop></audio>
  <audio id="beepSound" src="https://assets.mixkit.co/sfx/preview/mixkit-classic-alarm-995.mp3"></audio>
  <audio id="buzzerSound" src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-retro-game-over-213.mp3"></audio>

  <script>
    const tickSound = document.getElementById('tickSound');
    const beepSound = document.getElementById('beepSound');
    const buzzerSound = document.getElementById('buzzerSound');

    function handleSounds() {
      if (!draftStarted || draftComplete) {
        tickSound.pause();
        return;
      }

      if (timer > 10) {
        if (tickSound.paused) {
          tickSound.currentTime = 0;
          tickSound.play();
        }
      } else {
        tickSound.pause();
        if (timer > 0) {
          beepSound.currentTime = 0;
          beepSound.play();
        }
      }

      if (timer === 0) {
        buzzerSound.currentTime = 0;
        buzzerSound.play();
      }
    }

    const originalRenderClock = renderClock;
    renderClock = function() {
      originalRenderClock();
      handleSounds();
    };
  </script>
</body>
</html>
